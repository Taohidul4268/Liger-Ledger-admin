<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Liger-Ledger</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; --white: #ffffff; --danger: #e74c3c; --success: #2ecc71; --blue: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        #admin-lock { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .lock-box { background: var(--white); padding: 40px; border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }

        .container { max-width: 1200px; margin: 20px auto; padding: 20px; display: none; }
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-bottom: 4px solid var(--accent); }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: var(--primary); }

        .search-area { margin-bottom: 20px; }
        #adminSearch { width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; }

        .table-wrapper { background: var(--white); border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .ip-badge { background: #eee; padding: 4px 8px; border-radius: 5px; font-family: monospace; font-size: 12px; color: #555; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; margin: 2px; color: white; }
        .btn-view { background: var(--blue); }
        .btn-pass { background: #9b59b6; }
        .btn-ban { background: var(--danger); }
        .btn-unban { background: var(--success); }
        .btn-del { background: #636e72; }

        #userModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 20px; padding: 25px; position: relative; max-height: 85vh; overflow-y: auto; }
        .modal-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>

<div id="admin-lock">
    <div class="lock-box">
        <h2>Admin Login</h2>
        <input type="password" id="adminPass" placeholder="পাসওয়ার্ড লিখুন" style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px; border:1px solid #ddd; text-align:center;">
        <button onclick="verifyAdmin()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">প্রবেশ করুন</button>
    </div>
</div>

<div class="container" id="dashboard">
    <h2 style="text-align:center; color: var(--primary);">Liger-Ledger Super Admin</h2>
    
    <div class="header-stats">
        <div class="stat-card"><h3>মোট ইউজার</h3><p id="countU">0</p></div>
        <div class="stat-card"><h3>সিস্টেম ব্যালেন্স</h3><p id="totalB">0 ৳</p></div>
    </div>

    <div class="search-area">
        <input type="text" id="adminSearch" placeholder="নাম, ফোন বা IP দিয়ে ইউজার খুঁজুন..." onkeyup="doSearch()">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>নাম ও IP</th>
                    <th>ফোন</th>
                    <th>পাসওয়ার্ড</th>
                    <th>ব্যালেন্স</th>
                    <th>অবস্থা</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="userRows"></tbody>
        </table>
    </div>
</div>

<div id="userModal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:24px;" onclick="closeM()">&times;</span>
        <h3 id="mTitle" style="color:var(--accent);">ইউজার তথ্য</h3>
        <div id="mBody"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbXqIcQGjI2fyi7Ilt9DKIn5idwY6jeH4",
        authDomain: "liger-ledger.firebaseapp.com",
        projectId: "liger-ledger",
        storageBucket: "liger-ledger.firebasestorage.app",
        messagingSenderId: "429683760324",
        appId: "1:429683760324:web:6a71d4c1f14e435a157d91",
        databaseURL: "https://liger-ledger-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cacheUsers = {};
    let activePhone = null;

    function verifyAdmin() {
        if(document.getElementById('adminPass').value === "Liger@@4268") {
            document.getElementById('admin-lock').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initData();
        } else alert("ভুল পাসওয়ার্ড!");
    }

    function initData() {
        db.ref('users').on('value', snap => {
            cacheUsers = snap.val() || {};
            renderTable(cacheUsers);
        });
    }

    function renderTable(users) {
        const tbody = document.getElementById('userRows');
        tbody.innerHTML = '';
        let totalSystemCash = 0, userCount = 0;

        for (let phone in users) {
            userCount++;
            let u = users[phone];
            let balance = 0;
            if(u.data) u.data.forEach(e => balance += (e.type === 'income' ? e.amt : -e.amt));
            totalSystemCash += balance;
            let isBanned = u.isBanned === true;
            let ip = u.ipAddress || "N/A"; // IP Address দেখানো হচ্ছে

            tbody.innerHTML += `
                <tr class="u-row">
                    <td><b>${u.name}</b><br><span class="ip-badge">IP: ${ip}</span></td>
                    <td>${phone}</td>
                    <td><code>${u.pass}</code></td>
                    <td>${balance} ৳</td>
                    <td style="color:${isBanned ? 'red' : 'green'}; font-weight:bold;">${isBanned ? 'Banned' : 'Active'}</td>
                    <td>
                        <button class="btn btn-view" onclick="showHistory('${phone}')">লেনদেন</button>
                        <button class="btn btn-pass" onclick="openPassEdit('${phone}', '${u.pass}')">পাসওয়ার্ড</button>
                        ${isBanned ? 
                            `<button class="btn btn-unban" onclick="toggleBan('${phone}', false)">Unban</button>` : 
                            `<button class="btn btn-ban" onclick="toggleBan('${phone}', true)">Ban</button>`
                        }
                        <button class="btn btn-del" onclick="deleteU('${phone}')">🗑️</button>
                    </td>
                </tr>`;
        }
        document.getElementById('countU').innerText = userCount;
        document.getElementById('totalB').innerText = totalSystemCash + " ৳";
    }

    function doSearch() {
        let q = document.getElementById('adminSearch').value.toLowerCase();
        document.querySelectorAll('.u-row').forEach(r => {
            r.style.display = r.innerText.toLowerCase().includes(q) ? "" : "none";
        });
    }

    function showHistory(phone) {
        const u = cacheUsers[phone];
        document.getElementById('mTitle').innerText = u.name + " এর লেনদেন";
        let h = `<p>ফোন: ${phone}</p><hr>`;
        if(u.data) {
            u.data.forEach(i => {
                h += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee">
                        <span>${i.date}<br><small>${i.note}</small></span>
                        <b style="color:${i.type==='income'?'#00b894':'#d63031'}">${i.type==='income'?'+':'-'}${i.amt} ৳</b>
                      </div>`;
            });
        } else h += "<p>কোনো লেনদেন নেই।</p>";
        document.getElementById('mBody').innerHTML = h;
        document.getElementById('userModal').style.display = 'flex';
    }

    function openPassEdit(phone, currentPass) {
        activePhone = phone;
        document.getElementById('mTitle').innerText = "পাসওয়ার্ড পরিবর্তন";
        document.getElementById('mBody').innerHTML = `
            <p>ইউজার: ${phone}</p>
            <input type="text" id="newPassInput" class="modal-input" value="${currentPass}">
            <button onclick="saveNewPass()" style="width:100%; padding:10px; background:var(--success); color:white; border:none; border-radius:8px;">আপডেট করুন</button>
        `;
        document.getElementById('userModal').style.display = 'flex';
    }

    function saveNewPass() {
        const newPass = document.getElementById('newPassInput').value;
        if(newPass) {
            db.ref('users/' + activePhone).update({ pass: newPass })
            .then(() => { alert("সফল হয়েছে!"); closeM(); });
        }
    }

    function toggleBan(phone, status) {
        if(confirm(status ? "ব্যান করতে চান?" : "আনব্যান করতে চান?")) {
            db.ref('users/' + phone).update({ isBanned: status });
        }
    }

    function deleteU(p) {
        if(confirm("ইউজারটি ডিলিট করতে চান?")) db.ref('users/' + p).remove();
    }

    function closeM() { document.getElementById('userModal').style.display = 'none'; }
</script>
</body>
</html>
